<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>Sims 4 每日热门 Mod 推荐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #0d0d12;
            color: #e0e0e0;
            line-height: 1.6;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 40px 20px 80px;
            text-align: center;
            border-bottom: 1px solid #2a2a4a;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="%23ffffff10"/></svg>');
            background-size: 50px 50px;
            opacity: 0.3;
        }
        
        .header h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 8px;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }
        
        .header .subtitle {
            color: #8892b0;
            font-size: 1rem;
            position: relative;
            z-index: 1;
        }
        
        .game-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }
        
        .game-tab {
            padding: 10px 24px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #8892b0;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .game-tab:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-color: rgba(255,255,255,0.25);
        }
        
        .game-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
            max-width: 1200px;
            margin: -30px auto 20px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }
        
        .controls-inner {
            background: #1a1a24;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a2a3a;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        
        .search-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #2a2a3a;
            background: #0f0f14;
            color: #e0e0e0;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .search-input::placeholder {
            color: #5b5b6e;
        }
        
        .filter-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        
        .filter-tab {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid #2a2a3a;
            background: transparent;
            color: #8892b0;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }
        
        .filter-tab:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .filter-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: #fff;
        }
        
        .sort-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2a3a;
        }
        
        .sort-label {
            color: #5b5b6e;
            font-size: 0.85rem;
        }
        
        .sort-btn {
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid #2a2a3a;
            background: transparent;
            color: #8892b0;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .sort-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .sort-btn.active {
            background: #2a2a3a;
            border-color: #667eea;
            color: #667eea;
        }
        
        .view-toggle {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        
        .view-btn {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #2a2a3a;
            background: transparent;
            color: #8892b0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .view-btn.active {
            background: #2a2a3a;
            color: #fff;
        }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 12px 0 0;
            border-top: 1px solid #2a2a3a;
            margin-top: 12px;
            font-size: 0.85rem;
            color: #5b5b6e;
        }
        
        .stats-bar span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .stats-bar .highlight {
            color: #667eea;
            font-weight: 600;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .section-title {
            font-size: 1.3rem;
            color: #fff;
            margin: 30px 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title .date-badge {
            background: #2a2a3a;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            color: #8892b0;
        }
        
        .mod-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .mod-card {
            background: #1a1a24;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #2a2a3a;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .mod-card:hover {
            border-color: #3a3a5a;
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        
        .mod-card.hidden {
            display: none;
        }
        
        .mod-image-wrap {
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .mod-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #2a2a3a;
            transition: transform 0.5s ease;
        }
        
        .mod-card:hover .mod-image {
            transform: scale(1.05);
        }
        
        .mod-image-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .mod-card:hover .mod-image-overlay {
            opacity: 1;
        }
        
        .mod-image-overlay-text {
            background: rgba(102, 126, 234, 0.9);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .mod-image-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3a3a5a;
            font-size: 3rem;
            border-bottom: 1px solid #2a2a3a;
        }
        
        .mod-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .mod-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .mod-title {
            font-size: 1.1rem;
            color: #fff;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        
        .mod-number-badge {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #fff;
            font-size: 0.9rem;
            flex-shrink: 0;
            margin-right: 10px;
        }
        
        .mod-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            font-size: 0.8rem;
        }
        
        .mod-category {
            background: #2a2a3a;
            padding: 3px 10px;
            border-radius: 10px;
            color: #8892b0;
        }
        
        .mod-endorsements {
            color: #f0a500;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .mod-downloads {
            color: #667eea;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .mod-version {
            background: #0f3460;
            color: #667eea;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .mod-link {
            color: #667eea;
            text-decoration: none;
            word-break: break-all;
            font-size: 0.8rem;
        }
        
        .mod-link:hover {
            text-decoration: underline;
        }
        
        .mod-description {
            color: #b0b0c0;
            font-size: 0.9rem;
            margin-bottom: 16px;
            flex: 1;
        }
        
        .mod-reviews {
            background: #0f0f14;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 14px;
        }
        
        .review-title {
            font-size: 0.8rem;
            color: #5b5b6e;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .review-quote {
            border-left: 3px solid #667eea;
            padding: 8px 12px;
            margin-bottom: 8px;
            font-style: italic;
            color: #a0a0b0;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        
        .review-quote:last-child {
            margin-bottom: 0;
        }
        
        .review-author {
            color: #5b5b6e;
            font-style: normal;
            font-size: 0.75rem;
            margin-top: 4px;
            display: block;
        }
        
        .mod-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid #2a2a3a;
        }
        
        .fav-btn {
            background: transparent;
            border: 1px solid #2a2a3a;
            color: #5b5b6e;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .fav-btn:hover {
            border-color: #e74c3c;
            color: #e74c3c;
        }
        
        .fav-btn.favorited {
            background: #e74c3c;
            border-color: #e74c3c;
            color: #fff;
        }
        
        .fav-btn.favorited:hover {
            background: #c0392b;
            border-color: #c0392b;
        }
        
        .date-label {
            color: #5b5b6e;
            font-size: 0.8rem;
        }
        
        /* 空状态 */
        .no-results {
            text-align: center;
            padding: 80px 20px;
        }
        
        .no-results-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .no-results h3 {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        
        .no-results p {
            color: #5b5b6e;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }
        
        .no-results .clear-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .no-results .clear-btn:hover {
            opacity: 0.85;
        }
        
        .empty-fav {
            text-align: center;
            padding: 40px 20px;
            color: #5b5b6e;
        }
        
        .empty-fav-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }
        
        /* 收藏区 */
        .favorites-section {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid #2a2a4a;
        }
        
        .favorites-section h2 {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        
        .fav-card {
            background: #1a1a24;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #2a2a3a;
            display: flex;
            gap: 12px;
            align-items: center;
            transition: all 0.3s;
        }
        
        .fav-card:hover {
            border-color: #3a3a5a;
            transform: translateY(-2px);
        }
        
        .fav-card img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        .fav-card-info {
            flex: 1;
        }
        
        .fav-card-title {
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .fav-card-meta {
            color: #5b5b6e;
            font-size: 0.8rem;
        }
        
        .fav-card .remove-fav {
            background: none;
            border: none;
            color: #5b5b6e;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px;
            transition: color 0.3s;
        }
        
        .fav-card .remove-fav:hover {
            color: #e74c3c;
        }
        
        /* 灯箱 */
        .lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .lightbox img {
            max-width: 90%;
            max-height: 85%;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .lightbox-close {
            position: absolute;
            top: 20px; right: 30px;
            color: #fff;
            font-size: 2.5rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
            background: none;
            border: none;
        }
        
        .lightbox-close:hover {
            opacity: 1;
        }
        
        .lightbox-caption {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #8892b0;
            font-size: 0.9rem;
            text-align: center;
        }
        
        /* 回到顶部 */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            z-index: 100;
        }
        
        .back-to-top.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .back-to-top:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
        }
        
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #5b5b6e;
            font-size: 0.85rem;
        }
        
        .footer .divider {
            width: 40px;
            height: 1px;
            background: #2a2a3a;
            margin: 0 auto 16px;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.5rem; }
            .mod-grid { grid-template-columns: 1fr; }
            .controls-inner { padding: 16px; }
            .search-row { flex-direction: column; }
            .view-toggle { margin-left: 0; }
            .sort-row { flex-direction: column; align-items: flex-start; }
            .back-to-top {
                bottom: 20px; right: 20px;
                width: 40px; height: 40px;
            }
        }
    </style>
</head>

    <div class="header">

        <div class="subtitle">The Sims 4 · 模拟人生4</div>
        <div class="game-tabs">

    <div class="controls">

                <div class="view-toggle">

            <div class="sort-row">

    <div class="container">

                <div id="favoritesContent"></div>
            </div>
        </div>
        
        <div id="modSections"></div>
        
        <div class="no-results" id="noResults" style="display: none;">

            <button class="clear-btn" onclick="clearFilters()">清除所有筛选</button>
        </div>
    </div>
    
    <div class="footer">
        <div class="divider"></div>

        <img id="lightboxImg" src="" alt="">
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
    
    <!-- 回到顶部 -->
    <button class="back-to-top" id="backToTop" onclick="scrollToTop()">↑</button>

        // ===== 收藏功能（localStorage） =====
        const FAV_KEY = 'sims4_mods_favorites';
        
        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem(FAV_KEY) || '[]');
            } catch {
                return [];
            }
        }
        
        function saveFavorites(favs) {
            localStorage.setItem(FAV_KEY, JSON.stringify(favs));
        }
        
        function toggleFavorite(modId) {
            const favs = getFavorites();
            const idx = favs.indexOf(modId);
            if (idx >= 0) {
                favs.splice(idx, 1);
            } else {
                favs.push(modId);
            }
            saveFavorites(favs);
            renderAll();
        }
        
        function isFavorited(modId) {
            return getFavorites().includes(modId);
        }
        
        // ===== 排序 =====
        let currentSort = 'default';
        
        function getSortedMods(mods) {
            const sorted = [...mods];
            switch (currentSort) {
                case 'endorsements':
                    return sorted.sort((a, b) => b.endorsements - a.endorsements);
                case 'name':
                    return sorted.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
                case 'date':
                    return sorted.sort((a, b) => b.date.localeCompare(a.date));
                default:
                    return sorted;
            }
        }
        
        // ===== 灯箱 =====
        function openLightbox(imgSrc, caption) {
            const box = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            const cap = document.getElementById('lightboxCaption');
            img.src = imgSrc;
            cap.textContent = caption;
            box.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            const box = document.getElementById('lightbox');
            box.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });
        
        // ===== 回到顶部 =====
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        window.addEventListener('scroll', function() {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });
        
        // ===== 渲染 =====
        function renderModCard(mod, index) {
            const fav = isFavorited(mod.id);
            const downloads = mod.downloads > 0 ? `⬇ ${mod.downloads.toLocaleString()}` : '';
            const version = mod.version ? `<span class="mod-version">v${mod.version}</span>` : '';
            
            return `
                <div class="mod-card" data-id="${mod.id}" data-category="${mod.category}" data-name="${mod.name}" data-desc="${mod.description}" data-reviews="${mod.reviews.map(r => r.text).join(' ')}" data-date="${mod.date}" data-endorsements="${mod.endorsements}">
                    <div class="mod-image-wrap" onclick="openLightbox('${mod.image}', '${mod.name}')">
                        <img src="${mod.image}" alt="${mod.name}" class="mod-image" onerror="this.style.display='none'; this.parentElement.querySelector('.mod-image-placeholder').style.display='flex';" loading="lazy">
                        <div class="mod-image-placeholder" style="display:none">📦</div>
                        <div class="mod-image-overlay">
                            <span class="mod-image-overlay-text">🔍 查看大图</span>
                        </div>
                    </div>
                    <div class="mod-content">
                        <div class="mod-header-row">
                            <div style="display:flex;align-items:flex-start">
                                <div class="mod-number-badge">${index + 1}</div>
                                <div>
                                    <div class="mod-title">${mod.name}</div>
                                    <div class="mod-meta">
                                        <span class="mod-category">${mod.category}</span>
                                        <span class="mod-endorsements">⭐ ${mod.endorsements.toLocaleString()}</span>
                                        ${downloads ? `<span class="mod-downloads">${downloads}</span>` : ''}
                                        ${version}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <a href="${mod.url}" target="_blank" class="mod-link">🔗 查看 Nexus 原址</a>
                        <div class="mod-description">${mod.description}</div>
                        <div class="mod-reviews">
                            <div class="review-title">用户评价</div>
                            ${mod.reviews.map(r => `
                                <div class="review-quote">
                                    <p>${r.text}</p>
                                    <span class="review-author">— ${r.author}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mod-actions">
                            <button class="fav-btn ${fav ? 'favorited' : ''}" onclick="toggleFavorite('${mod.id}')">
                                ${fav ? '❤️ 已收藏' : '🤍 收藏'}
                            </button>
                            <span class="date-label">${mod.date}</span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderSections() {
            const container = document.getElementById('modSections');
            const grouped = {};
            
            MOD_DATA.forEach(mod => {
                if (!grouped[mod.date]) grouped[mod.date] = [];
                grouped[mod.date].push(mod);
            });
            
            const sortedDates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
            
            container.innerHTML = sortedDates.map(date => {
                const mods = getSortedMods(grouped[date]);
                const isToday = date === '2026-06-17';
                return `
                    <div class="section-title">
                        ${isToday ? '📌' : '📅'} ${isToday ? '今日推送' : '历史推送'}
                        <span class="date-badge">${date}</span>
                    </div>
                    <div class="mod-grid" data-date="${date}">
                        ${mods.map((mod, i) => renderModCard(mod, i)).join('')}
                    </div>
                `;
            }).join('');
        }
        
        function renderFavorites() {
            const favs = getFavorites();
            const section = document.getElementById('favoritesSection');
            const content = document.getElementById('favoritesContent');
            
            if (favs.length === 0) {
                section.style.display = 'none';
                return;
            }
            
            const favMods = MOD_DATA.filter(m => favs.includes(m.id));
            
            content.innerHTML = `
                <div class="favorites-grid">
                    ${favMods.map(mod => `
                        <div class="fav-card">
                            <img src="${mod.image}" alt="${mod.name}" onerror="this.style.display='none'" loading="lazy">
                            <div class="fav-card-info">
                                <div class="fav-card-title">${mod.name}</div>
                                <div class="fav-card-meta">${mod.category} · ⭐ ${mod.endorsements.toLocaleString()}</div>
                            </div>
                            <button class="remove-fav" onclick="toggleFavorite('${mod.id}')">×</button>
                        </div>
                    `).join('')}
                </div>
            `;
            
            section.style.display = 'block';
        }
        
        function updateFavButtons() {
            document.querySelectorAll('.fav-btn').forEach(btn => {
                const card = btn.closest('.mod-card');
                const id = card.dataset.id;
                const fav = isFavorited(id);
                btn.className = `fav-btn ${fav ? 'favorited' : ''}`;
                btn.innerHTML = fav ? '❤️ 已收藏' : '🤍 收藏';
            });
        }
        
        function updateStats() {
            document.getElementById('totalCount').textContent = MOD_DATA.length;
            document.getElementById('todayCount').textContent = MOD_DATA.filter(m => m.date === '2026-06-17').length;
            document.getElementById('favCount').textContent = getFavorites().length;
        }
        
        function renderAll() {
            renderSections();
            renderFavorites();
            updateStats();
            filterMods();
        }
        
        // ===== 筛选与搜索 =====
        function filterMods() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const activeFilter = document.querySelector('.filter-tab.active').dataset.filter;
            const cards = document.querySelectorAll('.mod-card');
            let visibleCount = 0;
            
            cards.forEach(card => {
                const id = card.dataset.id;
                const category = card.dataset.category;
                const name = card.dataset.name.toLowerCase();
                const desc = card.dataset.desc.toLowerCase();
                const reviews = card.dataset.reviews.toLowerCase();
                const fav = isFavorited(id);
                
                const matchSearch = !search || name.includes(search) || desc.includes(search) || reviews.includes(search);
                const matchFilter = activeFilter === 'all' || 
                                   (activeFilter === 'favorites' && fav) ||
                                   category === activeFilter;
                
                if (matchSearch && matchFilter) {
                    card.classList.remove('hidden');
                    visibleCount++;
                } else {
                    card.classList.add('hidden');
                }
            });
            
            // 显示/隐藏无结果提示
            document.getElementById('noResults').style.display = visibleCount === 0 ? 'block' : 'none';
            
            // 显示/隐藏日期分组标题
            document.querySelectorAll('.mod-grid').forEach(grid => {
                const visibleCards = grid.querySelectorAll('.mod-card:not(.hidden)');
                const sectionTitle = grid.previousElementSibling;
                if (visibleCards.length === 0) {
                    grid.style.display = 'none';
                    if (sectionTitle) sectionTitle.style.display = 'none';
                } else {
                    grid.style.display = 'grid';
                    if (sectionTitle) sectionTitle.style.display = 'flex';
                }
            });
        }
        
        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.filter-tab[data-filter="all"]').classList.add('active');
            document.querySelectorAll('.sort-btn').forEach(t => t.classList.remove('active'));
            document.querySelector('.sort-btn[data-sort="default"]').classList.add('active');
            currentSort = 'default';
            renderAll();
        }
        
        // ===== 事件绑定 =====
        document.getElementById('searchInput').addEventListener('input', filterMods);
        
        document.getElementById('filterTabs').addEventListener('click', e => {
            if (e.target.classList.contains('filter-tab')) {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                filterMods();
            }
        });
        
        document.querySelector('.sort-row').addEventListener('click', e => {
            if (e.target.classList.contains('sort-btn')) {
                document.querySelectorAll('.sort-btn').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentSort = e.target.dataset.sort;
                renderAll();
            }
        });
        
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const view = btn.dataset.view;
                document.querySelectorAll('.mod-grid').forEach(grid => {
                    grid.style.gridTemplateColumns = view === 'list' ? '1fr' : 'repeat(auto-fill, minmax(350px, 1fr))';
                });
            });
        });
        
        // ===== 初始化 =====
        renderAll();
    </script>
</body>
