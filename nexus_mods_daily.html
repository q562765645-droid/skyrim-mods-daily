                ]
            }
        ];
        
        // ===== 收藏功能（localStorage） =====
        const FAV_KEY = 'nexus_mods_favorites';
        
        function getFavorites() {
            try {
                return JSON.parse(localStorage.getItem(FAV_KEY) || '[]');
            } catch {
                return [];
            }
        }
        
        function saveFavorites(favs) {
            localStorage.setItem(FAV_KEY, JSON.stringify(favs));
        }
        
        function toggleFavorite(modId) {
            const favs = getFavorites();
            const idx = favs.indexOf(modId);
            if (idx >= 0) {
                favs.splice(idx, 1);
            } else {
                favs.push(modId);
            }
            saveFavorites(favs);
            renderFavorites();
            updateFavButtons();
            updateStats();
        }
        
        function isFavorited(modId) {
            return getFavorites().includes(modId);
        }
        
        // ===== 渲染函数 =====
        function renderModCard(mod, index) {
            const fav = isFavorited(mod.id);
            return `
                <div class="mod-card" data-id="${mod.id}" data-category="${mod.category}" data-name="${mod.name}" data-desc="${mod.description}" data-reviews="${mod.reviews.map(r => r.text).join(' ')}" data-date="${mod.date}">
                    <img src="${mod.image}" alt="${mod.name}" class="mod-image" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                    <div class="mod-image-placeholder" style="display:none">📦</div>
                    <div class="mod-content">
                        <div class="mod-header-row">
                            <div style="display:flex;align-items:flex-start">
                                <div class="mod-number-badge">${index + 1}</div>
                                <div>
                                    <div class="mod-title">${mod.name}</div>
                                    <div class="mod-meta">
                                        <span class="mod-category">${mod.category}</span>
                                        <span class="mod-endorsements">⭐ ${mod.endorsements}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <a href="${mod.url}" target="_blank" class="mod-link">🔗 查看 Nexus 原址</a>
                        <div class="mod-description">${mod.description}</div>
                        <div class="mod-reviews">
                            <div class="review-title">用户评价</div>
                            ${mod.reviews.map(r => `
                                <div class="review-quote">
                                    <p>${r.text}</p>
                                    <span class="review-author">— ${r.author}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mod-actions">
                            <button class="fav-btn ${fav ? 'favorited' : ''}" onclick="toggleFavorite('${mod.id}')">
                                ${fav ? '❤️ 已收藏' : '🤍 收藏'}
                            </button>
                            <span class="date-label">${mod.date}</span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderSections() {
            const container = document.getElementById('modSections');
            const grouped = {};
            
            MOD_DATA.forEach(mod => {
                if (!grouped[mod.date]) grouped[mod.date] = [];
                grouped[mod.date].push(mod);
            });
            
            const sortedDates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
            
            container.innerHTML = sortedDates.map(date => {
                const mods = grouped[date];
                const isToday = date === '2026-06-17';
                return `
                    <div class="section-title">
                        ${isToday ? '📌' : '📅'} ${isToday ? '今日推送' : '历史推送'}
                        <span class="date-badge">${date}</span>
                    </div>
                    <div class="mod-grid" data-date="${date}">
                        ${mods.map((mod, i) => renderModCard(mod, i)).join('')}
                    </div>
                `;
            }).join('');
        }
        
        function renderFavorites() {
            const favs = getFavorites();
            const section = document.getElementById('favoritesSection');
            const grid = document.getElementById('favoritesGrid');
            
            if (favs.length === 0) {
                section.style.display = 'none';
                return;
            }
            
            const favMods = MOD_DATA.filter(m => favs.includes(m.id));
            
            grid.innerHTML = favMods.map(mod => `
                <div class="fav-card">
                    <img src="${mod.image}" alt="${mod.name}" onerror="this.style.display='none'">
                    <div class="fav-card-info">
                        <div class="fav-card-title">${mod.name}</div>
                        <div class="fav-card-meta">${mod.category} · ⭐ ${mod.endorsements}</div>
                    </div>
                    <button class="remove-fav" onclick="toggleFavorite('${mod.id}')">×</button>
                </div>
            `).join('');
            
            section.style.display = 'block';
        }
        
        function updateFavButtons() {
            document.querySelectorAll('.fav-btn').forEach(btn => {
                const card = btn.closest('.mod-card');
                const id = card.dataset.id;
                const fav = isFavorited(id);
                btn.className = `fav-btn ${fav ? 'favorited' : ''}`;
                btn.innerHTML = fav ? '❤️ 已收藏' : '🤍 收藏';
            });
        }
        
        function updateStats() {
            document.getElementById('totalCount').textContent = MOD_DATA.length;
            document.getElementById('todayCount').textContent = MOD_DATA.filter(m => m.date === '2026-06-17').length;
            document.getElementById('favCount').textContent = getFavorites().length;
        }
        
        // ===== 筛选与搜索 =====
        function filterMods() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const activeFilter = document.querySelector('.filter-tab.active').dataset.filter;
            const cards = document.querySelectorAll('.mod-card');
            let visibleCount = 0;
            
            cards.forEach(card => {
                const id = card.dataset.id;
                const category = card.dataset.category;
                const name = card.dataset.name.toLowerCase();
                const desc = card.dataset.desc.toLowerCase();
                const reviews = card.dataset.reviews.toLowerCase();
                const fav = isFavorited(id);
                
                const matchSearch = !search || name.includes(search) || desc.includes(search) || reviews.includes(search);
                const matchFilter = activeFilter === 'all' || 
                                   (activeFilter === 'favorites' && fav) ||
                                   category === activeFilter;
                
                if (matchSearch && matchFilter) {
                    card.classList.remove('hidden');
                    visibleCount++;
                } else {
                    card.classList.add('hidden');
                }
            });
            
            // 显示/隐藏无结果提示
            document.getElementById('noResults').style.display = visibleCount === 0 ? 'block' : 'none';
            
            // 显示/隐藏日期分组标题
            document.querySelectorAll('.mod-grid').forEach(grid => {
                const visibleCards = grid.querySelectorAll('.mod-card:not(.hidden)');
                const sectionTitle = grid.previousElementSibling;
                if (visibleCards.length === 0) {
                    grid.style.display = 'none';
                    if (sectionTitle) sectionTitle.style.display = 'none';
                } else {
                    grid.style.display = 'grid';
                    if (sectionTitle) sectionTitle.style.display = 'flex';
                }
            });
        }
        
        // ===== 事件绑定 =====
        document.getElementById('searchInput').addEventListener('input', filterMods);
        
        document.getElementById('filterTabs').addEventListener('click', e => {
            if (e.target.classList.contains('filter-tab')) {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                filterMods();
            }
        });
        
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const view = btn.dataset.view;
                document.querySelectorAll('.mod-grid').forEach(grid => {
                    grid.style.gridTemplateColumns = view === 'list' ? '1fr' : 'repeat(auto-fill, minmax(350px, 1fr))';
                });
            });
        });
        
        // ===== 初始化 =====
        renderSections();
        renderFavorites();
        updateStats();
    </script>
</body>
</html>
